name: nimbus_spend
description: A production-quality personal finance tracker with Life Cost analysis.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  provider: ^6.1.1
  shared_preferences: ^2.2.5
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  flex_color_scheme: ^8.1.1
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.2
  math_expressions: ^2.5.0
  home_widget: ^0.9.0

  flutter_animate: ^4.5.0
  animate_do: ^3.3.4
  lottie: ^3.1.2
  confetti: ^0.7.0

  intl: ^0.20.2
  uuid: ^4.3.3
  timezone: ^0.9.4


  audioplayers: ^5.2.1
  share_plus: ^7.2.2
  screenshot: ^3.0.0

  google_mobile_ads: ^4.0.0
  in_app_purchase: ^3.1.13
  vibration: ^2.0.1
  local_auth: ^2.3.0
  image_picker: ^1.0.7
  record: ^6.2.0
  android_alarm_manager_plus: ^4.0.4
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo1234.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo1234.png"

flutter:
  uses-material-design: true
  shaders:
    - assets/shaders/liquid.frag
  assets:
    - assets/sounds/
    - assets/animations/
    - assets/images/